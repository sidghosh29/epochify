<!DOCTYPE html>
<html>

<head>
    <title>Epochify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <script src="{{ url_for('static', path='/main.js') }}" defer></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4420928514247594"
        crossorigin="anonymous"></script>
</head>

<body>
    <nav>
        <a href="/" class="nav-brand">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" class="clock-svg">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
            </span>
            <span class="nav-title">Epochify</span>
            <span class="nav-version">v1.0.0</span>
        </a>
        <div class="nav-links">
            <a href="/duration" {% if request.url.path=='/duration' %}class="active" {% endif %}>Duration Calculator</a>
            <a href="/common-timestamps" {% if request.url.path=='/common-timestamps' %}class="active" {% endif
                %}>Common Events</a>
            <a href="/api-playground" {% if request.url.path=='/api-playground' %}class="active" {% endif %}>API
                Playground</a>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <footer>
        <span>&copy; 2026 Siddharth Ghosh &bull; All Rights Reserved</span>
        <span class="footer-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            <a href="/privacy">Privacy Policy</a>
        </span>
    </footer>
</body>

</html>
