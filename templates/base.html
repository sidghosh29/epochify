<!DOCTYPE html>
<html>

<head>
    <title>Epochify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>

<body>
    <nav>
        <a href="/" class="nav-brand">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" class="clock-svg">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
            </span>
            <span class="nav-title">Epochify</span>
            <span class="nav-version">v1.0.0</span>
        </a>
        <button onclick="document.querySelector('form').reset(); window.location.href='/'">Reset</button>
    </nav>
    {% block content %}{% endblock %}
    <footer>
        <span>&copy; 2026 Siddharth Ghosh &mdash; All Rights Reserved</span>
        <span class="footer-links">
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            <a href="/privacy">Privacy Policy</a>
        </span>
    </footer>
</body>

</html>
