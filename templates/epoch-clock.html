{% extends "base.html" %}
{% block content %}
<div class="container">

    <div class="clock-page-header">
        <h2 class="clock-page-title">Unix Epoch Clock</h2>
        <p class="clock-page-subtitle">A Unix timestamp counts the seconds elapsed since the Unix epoch, January 1, 1970, 00:00:00 UTC.</p>
    </div>

    <div class="clock-card">
        <div class="clock-local-time" id="clock-local"></div>
        <div class="clock-epoch" id="clock-epoch">—</div>
        <div class="clock-meta">
            <div class="clock-meta-row"><span class="clock-meta-label">Hex</span><span id="clock-hex">—</span></div>
            <div class="clock-meta-row"><span class="clock-meta-label">In Milliseconds</span><span
                    id="clock-ms">—</span></div>
            <div class="clock-meta-row clock-meta-muted"><span class="clock-meta-label">GMT</span><span
                    id="clock-gmt">—</span></div>
        </div>
    </div>

</div>

<script>
    function pad(n) { return String(n).padStart(2, '0'); }

    function update() {
        const now = new Date();
        const epoch = Math.floor(now.getTime() / 1000);

        // Local time string
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const offset = -now.getTimezoneOffset();
        const sign = offset >= 0 ? '+' : '-';
        const absOffset = Math.abs(offset);
        const offsetStr = `GMT${sign}${pad(Math.floor(absOffset / 60))}:${pad(absOffset % 60)}`;
        document.getElementById('clock-local').textContent =
            `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${offsetStr}`;

        // Epoch
        document.getElementById('clock-epoch').textContent = epoch.toLocaleString('en-US', { useGrouping: false });

        // Hex
        document.getElementById('clock-hex').textContent = epoch.toString(16).toUpperCase();

        // Milliseconds
        document.getElementById('clock-ms').textContent = now.getTime().toLocaleString('en-US', { useGrouping: false });

        // GMT
        document.getElementById('clock-gmt').textContent =
            `${days[now.getUTCDay()]}, ${now.getUTCDate()} ${months[now.getUTCMonth()]} ${now.getUTCFullYear()} ${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())}`;
    }

    update();
    setInterval(update, 1000);
</script>
{% endblock %}
